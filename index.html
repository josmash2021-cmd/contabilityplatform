<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ai Aethel Accountant</title>
    <link rel="icon" type="image/png" href="/apple-touch-icon.png?v=7" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      /* Hide Kimi Agent widget injected by hosting platform */
      [class*="kimi" i],
      [id*="kimi" i],
      [class*="agent" i][class*="button" i],
      [class*="floating" i][class*="button" i],
      .kimi-agent,
      .kimi-widget,
      .kimi-button,
      #kimi-agent,
      #kimi-widget,
      #kimi-button {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
        position: absolute !important;
        z-index: -9999 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
